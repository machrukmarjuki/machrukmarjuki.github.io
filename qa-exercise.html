<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Buggy Register Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, red, yellow, green);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            width: 380px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4364f7;
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .error { color: red; font-size: 14px; height: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://logowik.com/content/uploads/images/padepokan-tujuh-sembilan4259.logowik.com.webp" alt="Logo Padepokan 79"
        style="width:200px; display:block; margin:0 auto 10px auto;">

        <!-- BUG 1: Label salah mengarah ke ID yang berbeda -->
        <label for="wrongEmail">Email</label>
        <!-- BUG 2: Tipe masih text, bukan email -->
        <input type="text" id="email" placeholder="Masukkan email" />

        <!-- Username -->
        <label>Username</label>
        <!-- BUG 3: Tidak ada batasan karakter dan menerima simbol aneh -->
        <input type="text" id="username" placeholder="Masukkan usemame" />

        <!-- Password -->
        <label>Password</label>
        <!-- BUG 4: Password terlihat (harusnya type=password) -->
        <input type="text" id="password" placeholder="Masukkan password" />

        <!-- Confirm Password -->
        <label>Konfirmasi Password</label>
        <!-- BUG 5: Tidak ada validasi kecocokan password -->
        <input type="password" id="confirm" placeholder="Ulangi password" />

        <!-- Nomor Telepon -->
        <label>Nomor Telepon</label>
        <!-- BUG 6: type number tetap menerima huruf di beberapa browser -->
        <input type="number" id="phone" placeholder="Masukkan nomor telepon" />

        <!-- Gender -->
        <label>Gender</label>
        <!-- BUG 7: Value tidak konsisten & tidak ada validasi wajib pilih -->
        <select id="gender">
            <option value="">-- Pilih Gender --</option>
            <option value="L">Laki-Laki</option>
            <option value="P">Perempuan</option>
            <option value="X">Tidak Diketahui</option>
        </select>

        <!-- Checkbox -->
        <label>
            <!-- BUG 8: checkbox tanpa value -->
            <input type="checkbox" id="terms"> Saya setuju dengan syarat & ketentuan
        </label>

        <!-- Tombol -->
        <!-- BUG 9: ID tidak sesuai dengan script -->
        <button id="submitBtn">Daftar</button>

        <p class="error" id="errorMsg"></p>
    </div>

    <script>
        // BUG 10: Script mencari ID tombol yang salah (submitButton)
        document.getElementById("submitButton")?.addEventListener("click", function () {
            const email = document.getElementById("email").value;

            // BUG 11: Validasi email sangat lemah
            if (!email.includes("@")) {
                document.getElementById("errorMsg").innerText = "Email tidak valid";
            }
        });
    </script>
</body>
</html>
